<?xml version="1.0" encoding="UTF-8"?>
<!--
  =========================================
  hero.svg
  GitHubプロフィール冒頭用の自作アニメーションSVG
  - テンプレ感を消すため、よくあるTyping SVGは使わない
  - 暗めの背景 + 発光 + 軌道 + スキャンラインで作品感を出す
  - テキストは mizzzk-dev の世界観に寄せて最小限にする
  =========================================
-->
<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mizzzk-dev animated hero">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060816"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- 発光用グラデーション -->
    <radialGradient id="glow-violet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- 細いラインの光 -->
    <linearGradient id="line-grad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="20%" stop-color="#38bdf8" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#38bdf8" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- 右側カード用のガラス風グラデーション -->
    <linearGradient id="glass" x1="0" y1="0" x2="320" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>

    <!-- グリッドパターン -->
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" stroke="#94a3b8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <!-- ぼかし -->
    <filter id="blur-xl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <filter id="blur-md" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- 軽い影 -->
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- グリッド -->
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- 左上の大きい発光 -->
  <circle cx="210" cy="70" r="130" fill="url(#glow-violet)" filter="url(#blur-xl)" opacity="0.55">
    <animate attributeName="cx" values="210;250;210" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;100;70" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- 左下の青発光 -->
  <circle cx="320" cy="260" r="120" fill="url(#glow-blue)" filter="url(#blur-xl)" opacity="0.38">
    <animate attributeName="cx" values="320;280;320" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="260;230;260" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- 右側にも発光を置いて左右の密度を合わせる -->
  <circle cx="980" cy="120" r="110" fill="url(#glow-violet)" filter="url(#blur-xl)" opacity="0.28">
    <animate attributeName="cx" values="980;1010;980" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="120;140;120" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- 走査線。近未来感を出す -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#line-grad)" opacity="0.7">
    <animate attributeName="y" values="0;320;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- 左の情報ブロック -->
  <g transform="translate(74 78)">
    <!-- 小さなラベル -->
    <text x="0" y="0" fill="#a5b4fc" font-size="14" font-family="Segoe UI, Inter, Arial, sans-serif" letter-spacing="3">
      FRONTEND-FOCUSED / FULL STACK / FREELANCE BEGINNER
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </text>

    <!-- メイン名 -->
    <text x="0" y="68" fill="#f8fafc" font-size="54" font-weight="700" font-family="Segoe UI, Inter, Arial, sans-serif">
      mizzzk-dev
    </text>

    <!-- サブコピー -->
    <text x="0" y="104" fill="#cbd5e1" font-size="19" font-family="Segoe UI, Inter, Arial, sans-serif">
      crafting UI-first products with React / Next.js
    </text>

    <!-- 日本語の説明 -->
    <text x="0" y="142" fill="#94a3b8" font-size="16" font-family="Segoe UI, Inter, Arial, sans-serif">
      個人開発を続けながら、小さな案件や実装相談にも向き合い始めた開発者
    </text>

    <!-- 下線。静かに動かしてテンプレ感を消す -->
    <rect x="0" y="170" width="220" height="3" rx="999" fill="#8b5cf6" opacity="0.9">
      <animate attributeName="width" values="180;250;180" dur="5.5s" repeatCount="indefinite"/>
    </rect>

    <!-- 小さなチップ風ラベル -->
    <g transform="translate(0 196)">
      <rect x="0" y="0" width="110" height="28" rx="14" fill="#0f172a" stroke="#8b5cf6" stroke-opacity="0.45"/>
      <text x="20" y="19" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Inter, Arial, sans-serif">discord bot</text>
    </g>

    <g transform="translate(122 196)">
      <rect x="0" y="0" width="104" height="28" rx="14" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.45"/>
      <text x="21" y="19" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Inter, Arial, sans-serif">portfolio</text>
    </g>

    <g transform="translate(238 196)">
      <rect x="0" y="0" width="126" height="28" rx="14" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.45"/>
      <text x="18" y="19" fill="#e2e8f0" font-size="13" font-family="Segoe UI, Inter, Arial, sans-serif">small freelance</text>
    </g>
  </g>

  <!-- 右側の円軌道 -->
  <g>
    <circle cx="960" cy="152" r="88" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1.2"/>
    <circle cx="960" cy="152" r="116" stroke="#38bdf8" stroke-opacity="0.14" stroke-width="1"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 960 152" to="360 960 152" dur="13s" repeatCount="indefinite"/>
      <circle cx="1048" cy="152" r="4.5" fill="#8b5cf6"/>
      <circle cx="1048" cy="152" r="10" fill="#8b5cf6" opacity="0.18" filter="url(#blur-md)"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360 960 152" to="0 960 152" dur="18s" repeatCount="indefinite"/>
      <circle cx="844" cy="152" r="4.5" fill="#38bdf8"/>
      <circle cx="844" cy="152" r="10" fill="#38bdf8" opacity="0.16" filter="url(#blur-md)"/>
    </g>
  </g>

  <!-- 右下のガラス風カード -->
  <g transform="translate(786 168)" filter="url(#shadow)">
    <rect x="0" y="0" width="300" height="104" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="26" y="30" fill="#f8fafc" font-size="15" font-family="Segoe UI, Inter, Arial, sans-serif">current focus</text>

    <text x="26" y="58" fill="#cbd5e1" font-size="14" font-family="Segoe UI, Inter, Arial, sans-serif">build / refine / ship</text>

    <!-- 動くバーで静かなアニメーションを追加 -->
    <rect x="26" y="74" width="70" height="6" rx="999" fill="#1e293b"/>
    <rect x="26" y="74" width="46" height="6" rx="999" fill="#8b5cf6">
      <animate attributeName="width" values="30;62;46;54;30" dur="6s" repeatCount="indefinite"/>
    </rect>

    <rect x="108" y="74" width="70" height="6" rx="999" fill="#1e293b"/>
    <rect x="108" y="74" width="40" height="6" rx="999" fill="#38bdf8">
      <animate attributeName="width" values="20;58;36;52;20" dur="5.5s" repeatCount="indefinite"/>
    </rect>

    <rect x="190" y="74" width="70" height="6" rx="999" fill="#1e293b"/>
    <rect x="190" y="74" width="52" height="6" rx="999" fill="#a78bfa">
      <animate attributeName="width" values="26;60;48;56;26" dur="6.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 微細な粒子 -->
  <g fill="#e2e8f0" opacity="0.32">
    <circle cx="690" cy="70" r="1.2">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="112" r="1.1">
      <animate attributeName="opacity" values="0.12;0.4;0.12" dur="4.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1110" cy="78" r="1.4">
      <animate attributeName="opacity" values="0.1;0.45;0.1" dur="4.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="258" r="1.3">
      <animate attributeName="opacity" values="0.14;0.42;0.14" dur="3.9s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
